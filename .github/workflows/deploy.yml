name: Vastra Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      - name: Deployment Simulation
        run: echo "Deploying Vastra application to AWS EC2"

      - name: Nginx Configuration Validation
        run: echo "Validating Nginx reverse proxy configuration"

      - name: Deployment Completed
        run: echo "Application deployed successfully"
